##############################################################################
# COPY THIS FILE to:   .github/workflows/dependabot-manager.yml
# in each repository that should use dependabot-manager.
#
# Required setup steps for each consuming repo:
#   1. Add the PAT / App token as a secret named GH_ACTIONS_SYNC_TOKEN.
#      The token needs:
#        - security_events scope  (to dismiss Dependabot alerts)
#        - pull_requests scope    (to approve PRs and enable auto-merge)
#        - contents:read          (to read package manifests / lockfiles)
#
#   2. Add SECURITY_ALERT_WEBHOOK as a repository or org-level secret.
#      This is the Slack incoming webhook URL for your security channel.
#
#   3. In repo Settings → General → "Allow auto-merge" must be ENABLED
#      (only needed if you set enable-auto-merge: 'true').
#
#   4. Configure branch protection on your default branch to require at least
#      one status check — this is what tells GitHub when it's safe to merge.
##############################################################################
name: Dependabot Manager

on:
  # Triggered when Dependabot creates or re-introduces a security alert.
  dependabot_alert:
    types:
      - created
      - reintroduced

  # Triggered when Dependabot opens or updates a dependency-bump PR.
  pull_request:
    types:
      - opened
      - synchronize

# Concurrency: one run per alert or PR at a time; cancel outdated runs.
concurrency:
  group: dependabot-manager-${{ github.event_name }}-${{ github.event.alert.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Alert handler ───────────────────────────────────────────────────────────
  handle-alert:
    if: github.event_name == 'dependabot_alert'
    uses: YOUR_ORG/dependabot-manager/.github/workflows/handle-alert.yml@v1
    secrets:
      token: ${{ secrets.GH_ACTIONS_SYNC_TOKEN }}
      slack-webhook-url: ${{ secrets.SECURITY_ALERT_WEBHOOK }}
    with:
      # Dismiss anything below this severity; action above it.
      # Allowed: low | medium | high | critical
      min-severity: medium

      # Set to "true" to approve + auto-merge minor/patch bump PRs.
      # When false, a Slack notification is sent instead.
      enable-auto-merge: 'false'

  # ── Auto-merge handler ──────────────────────────────────────────────────────
  handle-automerge:
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    uses: YOUR_ORG/dependabot-manager/.github/workflows/handle-automerge.yml@v1
    secrets:
      token: ${{ secrets.GH_ACTIONS_SYNC_TOKEN }}
    with:
      min-severity: medium
      # merge | squash | rebase  — must match your branch protection setting
      merge-method: squash
      # Must match the value set in handle-alert above.
      enable-auto-merge: 'false'
