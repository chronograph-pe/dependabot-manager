##############################################################################
# Reusable workflow – Dependabot Alert Handler
#
# Consumers call this from their own repository workflow:
#
#   jobs:
#     dependabot-alert:
#       uses: YOUR_ORG/dependabot-manager/.github/workflows/handle-alert.yml@v1
#       secrets:
#         token: ${{ secrets.GH_ACTIONS_SYNC_TOKEN }}
#         slack-webhook-url: ${{ secrets.SECURITY_ALERT_WEBHOOK }}
#       with:
#         min-severity: medium
#
# Required secrets in the calling repo:
#   GH_ACTIONS_SYNC_TOKEN    – PAT or GitHub App token with:
#                              security-events:write, pull-requests:write, contents:read
#   SECURITY_ALERT_WEBHOOK   – Slack incoming webhook URL
#
##############################################################################
name: Dependabot Alert Handler (reusable)

on:
  workflow_call:
    inputs:
      min-severity:
        description: 'Minimum alert severity to act on (low | medium | high | critical)'
        type: string
        required: false
        default: 'medium'

      enable-auto-merge:
        description: >
          Set to "true" to approve Dependabot PRs and enable auto-merge for
          minor/patch bumps. Defaults to "false" — a webhook notification is
          sent instead so the team reviews before merging.
        type: string
        required: false
        default: 'false'

    secrets:
      token:
        description: >
          Token with security-events:write, pull-requests:write, contents:read.
        required: false
      slack-webhook-url:
        description: 'Slack incoming webhook URL for alert notifications'
        required: false

    outputs:
      action-taken:
        description: 'What the action did (see action.yml for possible values)'
        value: ${{ jobs.process-alert.outputs.action-taken }}

# Permissions required by this workflow.
# When called via workflow_call the effective permissions are the intersection
# of what the caller grants and what is declared here.
permissions:
  contents: read
  security-events: write   # dismiss Dependabot alerts
  pull-requests: write     # approve PRs / enable auto-merge

jobs:
  process-alert:
    name: Process Dependabot alert
    runs-on: ubuntu-latest

    # Only fire on newly-created or re-introduced alerts.
    # NOTE: github.event_name inside a workflow_call is always 'workflow_call',
    # not the original event type — so we check github.event.action directly.
    if: >
      github.event.action == 'created' || github.event.action == 'reintroduced'

    outputs:
      action-taken: ${{ steps.manager.outputs.action-taken }}

    steps:
      # Extract the exact ref this workflow was called at from github.workflow_ref
      # (e.g. "org/dependabot-manager/.github/workflows/handle-alert.yml@abc123")
      # so the action checkout always stays in sync with the pinned workflow SHA.
      - name: Resolve action checkout ref
        id: ref
        shell: bash
        run: |
          REF="${{ github.workflow_ref }}"
          echo "value=${REF##*@}" >> "$GITHUB_OUTPUT"

      - name: Checkout dependabot-manager action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/dependabot-manager
          ref: ${{ steps.ref.outputs.value }}
          token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          path: .dependabot-manager
          persist-credentials: false

      - name: Run dependabot-manager (alert mode)
        id: manager
        uses: ./.dependabot-manager
        with:
          github-token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          mode: alert
          min-severity: ${{ inputs.min-severity }}
          slack-webhook-url: ${{ secrets.slack-webhook-url }}
          enable-auto-merge: ${{ inputs.enable-auto-merge }}
